<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Q&A</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Custom scrollbar for chat */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-white border-b px-6 py-4 flex items-center justify-between shadow-sm z-10 shrink-0">
        <div class="flex items-center gap-2">
            <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <h1 class="text-xl font-semibold text-gray-800">DocQ&A Assistant</h1>
        </div>
        <div class="text-sm text-gray-500" id="session-id-display">Session: ...</div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden h-full">
        
        <!-- Left Panel: Document Upload & List (w-64) -->
        <aside class="w-64 bg-white border-r flex flex-col shadow-sm z-0 shrink-0">
            <div class="p-4 border-b bg-gray-50">
                <h2 class="text-xs font-semibold text-gray-600 uppercase tracking-wider mb-3">Upload Document</h2>
                
                <!-- Drag & Drop Zone -->
                <div id="drop-zone" class="border-2 border-dashed border-blue-200 bg-white rounded-lg p-4 text-center cursor-pointer hover:bg-blue-50 hover:border-blue-400 transition-colors">
                    <svg class="mx-auto h-6 w-6 text-blue-400 mb-2" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <div class="text-xs text-gray-600">
                        <label for="file-upload" class="relative cursor-pointer rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none">
                            <span>Upload a file</span>
                            <input id="file-upload" name="file-upload" type="file" class="sr-only" accept=".pdf,.doc,.docx,.txt">
                        </label>
                    </div>
                </div>
                <!-- Upload Progress/Status -->
                <div id="upload-status" class="mt-2 text-xs text-center hidden font-medium"></div>
            </div>

            <!-- Document List -->
            <div class="flex-1 overflow-y-auto p-3">
                <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 px-1">Your Documents</h2>
                <ul id="document-list" class="space-y-1">
                    <!-- Files will be listed here -->
                </ul>
            </div>
        </aside>

        <!-- Middle Panel: PDF Viewer (flex-1) -->
        <section class="flex-1 flex flex-col border-r bg-gray-200 relative shadow-inner">
            <div class="absolute inset-0 flex items-center justify-center text-gray-400 text-center px-4" id="pdf-placeholder">
                <div>
                    <svg class="mx-auto h-16 w-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    <p class="text-lg font-medium text-gray-500">No Document Selected</p>
                    <p class="text-sm mt-1">Upload a PDF and click it on the left to read it here.</p>
                </div>
            </div>
            <iframe id="pdf-viewer" class="w-full h-full hidden border-none z-10 bg-white"></iframe>
        </section>

        <!-- Right Panel: Chat Interface (w-96) -->
        <main class="w-96 flex flex-col bg-white relative shrink-0">
            <!-- Chat Header -->
            <div class="px-5 py-3 border-b bg-gray-50 shadow-sm flex items-center justify-between z-10 shrink-0">
                <h2 class="text-sm font-semibold text-gray-700">Chat Assistant</h2>
                <button class="text-xs text-gray-500 hover:text-blue-600" onclick="clearChat()">Clear</button>
            </div>
            
            <!-- Chat Messages Area -->
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-5 bg-white">
                <!-- Welcome Message -->
                <div class="flex gap-3">
                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <div class="bg-gray-50 rounded-2xl rounded-tl-none px-4 py-3 border text-sm text-gray-800">
                        Hello! Ask me any questions about your documents.
                    </div>
                </div>
            </div>

            <!-- Typing Indicator (Hidden by default) -->
            <div id="typing-indicator" class="hidden absolute bottom-20 left-4 flex gap-3 items-end">
                 <div class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center mb-1">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                 </div>
                 <div class="bg-gray-100 border rounded-2xl rounded-tl-none px-3 py-2 w-14 mb-1">
                    <div class="flex space-x-1 justify-center items-center h-4">
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
                    </div>
                 </div>
            </div>

            <!-- Chat Input Area -->
            <div class="bg-white border-t p-3 shrink-0">
                <form id="chat-form" class="relative flex items-center">
                    <input 
                        type="text" 
                        id="chat-input"
                        placeholder="Ask a question..." 
                        class="w-full bg-gray-100 border-transparent rounded-full pl-4 pr-10 py-2.5 focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 transition-all outline-none text-sm"
                        autocomplete="off"
                        required
                    >
                    <button type="submit" class="absolute right-1 p-1.5 rounded-full bg-blue-600 text-white hover:bg-blue-700 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Script to handle interactions -->
    <script>
        // State
        const API_BASE_URL = 'http://localhost:8000';
        const sessionId = 'session_' + Math.random().toString(36).substring(2, 9);
        document.getElementById('session-id-display').textContent = 'Session: ' + sessionId;
        
        let uploadedFiles = [];

        // DOM Elements
        const fileUpload = document.getElementById('file-upload');
        const dropZone = document.getElementById('drop-zone');
        const documentList = document.getElementById('document-list');
        const uploadStatus = document.getElementById('upload-status');
        
        const pdfViewer = document.getElementById('pdf-viewer');
        const pdfPlaceholder = document.getElementById('pdf-placeholder');

        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatContainer = document.getElementById('chat-container');
        const typingIndicator = document.getElementById('typing-indicator');

        // --- File Upload Logic ---

        fileUpload.addEventListener('change', handleFileUpload);
        
        // Drag and drop handlers
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('bg-blue-50', 'border-blue-400');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('bg-blue-50', 'border-blue-400');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-blue-50', 'border-blue-400');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                fileUpload.files = e.dataTransfer.files;
                handleFileUpload();
            }
        });

        async function handleFileUpload() {
            const file = fileUpload.files[0];
            if (!file) return;

            // UI Update
            uploadStatus.classList.remove('hidden', 'text-red-600', 'text-green-600');
            uploadStatus.classList.add('text-blue-600');
            uploadStatus.textContent = 'Uploading...';

            // Prepare FormData
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_BASE_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    uploadStatus.classList.replace('text-blue-600', 'text-green-600');
                    uploadStatus.textContent = 'Success!';
                    
                    // Add to list
                    addFileToList(file.name);
                    
                    setTimeout(() => uploadStatus.classList.add('hidden'), 2000);
                } else {
                    throw new Error(data.detail || 'Upload failed');
                }
            } catch (error) {
                console.error(error);
                uploadStatus.classList.replace('text-blue-600', 'text-red-600');
                uploadStatus.textContent = 'Error: ' + error.message;
            }
        }

        function addFileToList(filename) {
            if (uploadedFiles.includes(filename)) return;
            uploadedFiles.push(filename);
            
            const li = document.createElement('li');
            // Make the item clickable to load the PDF
            li.className = 'flex items-center p-2 rounded-md bg-white border border-gray-100 shadow-sm text-sm cursor-pointer hover:border-blue-300 hover:bg-blue-50 transition-colors';
            li.onclick = () => viewDocument(filename);
            
            li.innerHTML = `
                <svg class="w-4 h-4 text-blue-500 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"></path></svg>
                <span class="truncate text-gray-700 font-medium">${filename}</span>
            `;
            documentList.appendChild(li);
        }

        function viewDocument(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (ext === 'pdf') {
                pdfPlaceholder.classList.add('hidden');
                pdfViewer.classList.remove('hidden');
                pdfViewer.src = `${API_BASE_URL}/uploads/${encodeURIComponent(filename)}`;
            } else {
                pdfViewer.classList.add('hidden');
                pdfPlaceholder.classList.remove('hidden');
                pdfPlaceholder.innerHTML = `
                    <div>
                        <svg class="mx-auto h-12 w-12 mb-3 text-yellow-500 opacity-75" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <p class="text-md font-medium text-gray-600">No Preview Available</p>
                        <p class="text-xs mt-1 text-gray-500">Browsers cannot natively render .${ext} files. <br>The file is uploaded and available for Chat Q&A.</p>
                    </div>
                `;
            }
        }

        // --- Chat Logic ---

        function clearChat() {
            chatContainer.innerHTML = `
                <div class="flex gap-3">
                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <div class="bg-gray-50 rounded-2xl rounded-tl-none px-4 py-3 border text-sm text-gray-800">
                        Chat cleared. How can I help?
                    </div>
                </div>
            `;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;

            // Add user message
            addChatMessage(message, 'user');
            chatInput.value = '';
            
            // Show typing
            typingIndicator.classList.remove('hidden');
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, message: message })
                });

                if (!response.ok) throw new Error('Chat API error');

                const data = await response.json();
                
                // Hide typing
                typingIndicator.classList.add('hidden');
                
                // Add AI message
                addChatMessage(data.answer, 'ai', data.sources);
                
            } catch (error) {
                console.error(error);
                typingIndicator.classList.add('hidden');
                addChatMessage('Sorry, an error occurred while connecting to the server.', 'system');
            }
        });

        function addChatMessage(text, sender, sources = []) {
            const div = document.createElement('div');
            div.className = 'flex gap-3 ' + (sender === 'user' ? 'flex-row-reverse' : '');
            
            let avatar = '';
            if (sender === 'user') {
                avatar = `
                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center">
                        <span class="text-sm font-semibold text-white">U</span>
                    </div>`;
            } else if (sender === 'ai') {
                avatar = `
                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center border border-blue-200">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>`;
            }

            let bubbleClasses = sender === 'user' 
                ? 'bg-blue-600 text-white rounded-2xl rounded-tr-none' 
                : sender === 'system' 
                ? 'bg-red-50 text-red-800 border border-red-200 rounded-2xl rounded-tl-none'
                : 'bg-gray-50 text-gray-800 border rounded-2xl rounded-tl-none';

            let sourcesHtml = '';
            if (sources && sources.length > 0) {
                sourcesHtml = '<div class="mt-2 pt-2 border-t border-gray-200 flex flex-wrap gap-1.5">';
                
                // Deduplicate sources by name
                const uniqueSources = [...new Set(sources.map(s => s.source))];
                
                uniqueSources.forEach(s => {
                    sourcesHtml += `<span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium bg-white border border-gray-200 text-gray-500 cursor-pointer hover:bg-gray-50" onclick="viewDocument('${escapeHtml(s)}')"><svg class="mr-1 h-3 w-3 text-blue-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"></path></svg>${escapeHtml(s)}</span>`;
                });
                sourcesHtml += '</div>';
            }

            let parsedText = sender === 'ai' ? marked.parse(text) : escapeHtml(text);
            let textContainerClass = sender === 'ai' 
                ? 'prose prose-sm max-w-none text-gray-800' 
                : 'whitespace-pre-wrap';

            div.innerHTML = `
                ${avatar}
                <div class="${bubbleClasses} px-4 py-3 shadow-sm max-w-[85%] text-[13px] leading-relaxed">
                    <div class="${textContainerClass}">
                        ${parsedText}
                    </div>
                    ${sender === 'ai' ? sourcesHtml : ''}
                </div>
            `;
            
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
